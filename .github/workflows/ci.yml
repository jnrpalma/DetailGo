name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: Formatacao
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instala dependencias
        run: npm ci

      - name: Verifica formatacao
        run: npm run format:check

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instala dependencias
        run: npm ci

      - name: Verifica tipos
        run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instala dependencias
        run: npm ci

      - name: Executa lint
        run: npm run lint

  tests:
    name: Testes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instala dependencias
        run: npm ci

      - name: Executa testes
        run: npm test -- --runInBand --watchAll=false

  android-debug:
    name: Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configura Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Instala dependencias
        run: npm ci

      - name: Prepara google-services.json temporario
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          elif [ ! -f android/app/google-services.json ]; then
            cat > android/app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "detailgo-ci",
              "storage_bucket": "detailgo-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.testapp"
                  }
                },
                "api_key": [
                  {
                    "current_key": "ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi

      - name: Prepara debug keystore temporaria
        shell: bash
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Gera build Android debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

  secrets:
    name: Verifica arquivos sensiveis
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Bloqueia arquivos sensiveis versionados
        shell: bash
        run: |
          blocked_regex='(^|/)(\.env(\..*)?|google-services\.json|GoogleService-Info\.plist|serviceAccountKey\.json|.*service-account.*\.json|.*credentials.*\.json|.*\.(jks|keystore|pem|p12|key|cer|der))$'
          found="$(git ls-files | grep -Ei "$blocked_regex" || true)"

          if [ -n "$found" ]; then
            echo "Arquivos sensiveis encontrados no Git:"
            echo "$found"
            exit 1
          fi

          if git grep -n -E '-----BEGIN (RSA |EC |OPENSSH |)PRIVATE KEY-----' -- . ':!package-lock.json'; then
            echo "Possivel chave privada encontrada no codigo."
            exit 1
          fi

  commit-lint:
    name: Valida mensagens de commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instala dependencias
        run: npm ci

      - name: Valida commits do PR
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
