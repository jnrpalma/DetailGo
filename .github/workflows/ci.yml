name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissões mínimas necessárias (segurança)
permissions:
  contents: read

jobs:
  quality:
    name: Qualidade de código
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false  # ignora worktrees e submodulos do Claude

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instala dependências
        run: npm ci

      - name: Verifica formatação (Prettier)
        run: npm run format:check

      - name: Verifica tipos TypeScript
        run: npx tsc --noEmit

  commit-lint:
    name: Valida mensagens de commit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instala dependências
        run: npm ci

      - name: Valida commits do PR
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
